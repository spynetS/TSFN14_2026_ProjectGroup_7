apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitnessduel
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fitnessduel
  template:
    metadata:
      labels:
        app: fitnessduel
    spec:
      containers:
      - name: fitnessduel-pod
        #image: task3qkdm9k.azurecr.io/fitnessduel-backend:latest 
        #imagePullPolicy: Always
        image: fitnessduel-backend:latest 
        imagePullPolicy: Never

        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: DATABASE_URI
          value: "mongodb://root:example@fitnessduel-mongo:27017/mydb?authSource=admin"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "690m"
            memory: "256Mi"