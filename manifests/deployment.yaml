apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitnessduel
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fitnessduel
  template:
    metadata:
      labels:
        app: fitnessduel
    spec:
      containers:
      - name: fitnessduel-pod
        image: fitnessduelacr.azurecr.io/fitnessduel-backend:latest
        imagePullPolicy: Always
        # image: fitnessduel-backend:latest
        # imagePullPolicy: Never

        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: DATABASE_URI
          value: "mongodb://root:example@fitnessduel-mongo:27017/mydb?authSource=admin"
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: SESSION_SECRET
        startupProbe:
          httpGet:
            path: /api/started
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 30

        livenessProbe:
          httpGet:
            path: /api/alive
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 100

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "690m"
            memory: "256Mi"
